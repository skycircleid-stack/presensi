<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Sekolah - Sky Circle</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">
            <div class="logo-icon"><div></div><div></div><div></div><div></div></div>
            <span>SKY CIRCLE</span>
        </div>
        <div class="nav-label">Main Menu</div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="fas fa-chart-line"></i><span>Rekap Data</span></a></li>
            <li class="nav-item"><a href="students.html" class="nav-link"><i class="fas fa-user-graduate"></i><span>Database Siswa</span></a></li>
            <li class="nav-item"><a href="mentors.html" class="nav-link"><i class="fas fa-user-tie"></i><span>Database Mentor</span></a></li>
            <li class="nav-item"><a href="reports.html" class="nav-link active"><i class="fas fa-file-invoice"></i><span>Laporan Sekolah</span></a></li>
            <li class="nav-item"><a href="settings.html" class="nav-link"><i class="fas fa-plug"></i><span>WA Lite Settings</span></a></li>
        </ul>
    </nav>

    <main class="main-content">
        <header>
            <div style="display: flex; align-items: center; gap: 20px;">
                <button class="btn" onclick="toggleSidebar()" style="background: transparent; font-size: 20px; padding: 0;">
                    <i class="fas fa-bars"></i>
                </button>
                <h1>Laporan Ke Sekolah</h1>
            </div>
            <div class="header-actions">
                <button class="btn" onclick="toggleDarkMode()" style="background: var(--bg-card); box-shadow: var(--shadow); border-radius: 50%; width: 40px; height: 40px; justify-content: center; padding: 0;">
                    <i class="fas fa-moon" id="theme-icon"></i>
                </button>
            </div>
        </header>

        <div class="grid-2-1" style="grid-template-columns: 1fr 1fr;">
            <div class="card">
                <div class="section-title"><span>SMA Negeri 2 Cibinong</span></div>
                <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 20px;">Laporan kehadiran bulanan untuk pihak sekolah.</p>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-primary"><i class="fas fa-download"></i> PDF</button>
                    <button class="btn" style="background: var(--primary-light); color: var(--primary);"><i class="fas fa-share-alt"></i> Kirim ke Sekolah</button>
                </div>
            </div>
            <div class="card">
                <div class="section-title"><span>SMK Bina Karya</span></div>
                <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 20px;">Laporan kehadiran bulanan untuk pihak sekolah.</p>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-primary"><i class="fas fa-download"></i> PDF</button>
                    <button class="btn" style="background: var(--primary-light); color: var(--primary);"><i class="fas fa-share-alt"></i> Kirim ke Sekolah</button>
                </div>
            </div>
        </div>
    </main>
    <script src="../js/app.js"></script>
</body>
</html>
