<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Circle - Portal Presensi</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-body);
            margin: 0;
        }
        .portal-card {
            background: var(--bg-card);
            padding: 48px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        .portal-logo {
            margin-bottom: 24px;
        }
        .portal-options {
            display: grid;
            gap: 20px;
            margin-top: 32px;
        }
        .option-btn {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-main);
            background: #f8f9fa;
            border: 1px solid var(--border-color);
            transition: var(--transition);
            text-align: left;
        }
        .option-btn:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            background: var(--primary-light);
        }
        .option-btn i {
            font-size: 24px;
            color: var(--primary);
        }
        .option-title {
            font-weight: 600;
            display: block;
        }
        .option-desc {
            font-size: 13px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="portal-card">
        <div class="portal-logo">
            <div class="logo-icon" style="margin: 0 auto 16px;"><div></div><div></div><div></div><div></div></div>
            <h1 style="font-size: 28px; margin: 0;">SKY CIRCLE</h1>
            <p style="color: var(--text-muted); margin-top: 8px;">Portal Presensi Mentoring</p>
        </div>

        <div class="portal-options">
            <a href="admin/dashboard.html" class="option-btn">
                <i class="fas fa-user-shield"></i>
                <div>
                    <span class="option-title">Admin Dashboard</span>
                    <span class="option-desc">Monitoring kehadiran global & WA Bot.</span>
                </div>
            </a>
            <a href="school/dashboard.html" class="option-btn">
                <i class="fas fa-school"></i>
                <div>
                    <span class="option-title">School Dashboard</span>
                    <span class="option-desc">Monitoring khusus SMA N 2 Cibinong.</span>
                </div>
            </a>
        </div>
        
        <p style="margin-top: 40px; font-size: 12px; color: var(--text-muted);">
            &copy; 2024 Sky Circle Mentoring System
        </p>
    </div>
</body>
</html>
